<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Professor Outreach</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --primary-light: #e0e7ff;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-500: #6b7280;
            --gray-900: #111827;
            --white: #ffffff;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --success: #10b981;
            --success-light: #d1fae5;
            --radius: 8px;
            --radius-lg: 16px;
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container { width: 100%; max-width: 400px; padding: 20px; }
        .login-box {
            background: var(--white); padding: 40px;
            border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
        }
        .login-header { text-align: center; margin-bottom: 32px; }
        .login-icon {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            border-radius: var(--radius-lg);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; margin: 0 auto 16px;
        }
        .login-header h2 { font-size: 24px; font-weight: 700; color: var(--gray-900); margin-bottom: 8px; }
        .login-header p { color: var(--gray-500); font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; margin-bottom: 8px;
            font-weight: 600; font-size: 14px; color: var(--gray-700);
        }
        .form-group input {
            width: 100%; padding: 12px 16px;
            border: 1px solid var(--gray-200); border-radius: var(--radius);
            font-family: inherit; font-size: 14px; color: var(--gray-900);
            transition: all 0.2s;
        }
        .form-group input:focus {
            outline: none; border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }
        .btn-login {
            width: 100%; padding: 12px;
            background: var(--primary); color: white;
            border: none; border-radius: var(--radius);
            font-weight: 600; font-size: 16px;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-login:hover { background: var(--primary-dark); }
        .alert {
            padding: 12px 16px; border-radius: var(--radius);
            margin-bottom: 20px; font-size: 14px; font-weight: 500;
        }
        .alert-error { background: var(--danger-light); color: #991b1b; }
        .alert-success { background: var(--success-light); color: #065f46; }
        .signup-link {
            text-align: center; margin-top: 24px;
            padding-top: 24px; border-top: 1px solid var(--gray-200);
            color: var(--gray-500); font-size: 14px;
        }
        .signup-link a {
            color: var(--primary); font-weight: 600; text-decoration: none;
        }
        .signup-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="login-icon">&#127891;</div>
                <h2>Welcome Back</h2>
                <p>Sign in to your outreach dashboard</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="/login">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-login">&#128274; Sign In</button>
            </form>

            <div class="signup-link">
                Don't have an account? <a href="/signup">Sign up</a>
            </div>
        </div>
    </div>
</body>
</html>
